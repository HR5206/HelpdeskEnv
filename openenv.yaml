spec_version: "1.0"
name: HelpdeskEnv
id: helpdeskenv
type: space
version: "2.1.0"
description: >-
  Multi-agent IT helpdesk where Triage, L1, L2, and L3 agents collaborate
  to resolve tickets under SLA pressure, with a persistent Knowledge Base
  that enables self-improvement across episodes.
license: Apache-2.0
homepage: "https://huggingface.co/spaces/Harishraghav-05/helpdesk_env"
repository: "https://github.com/HR5206/HelpdeskEnv"
maintainers:
  - name: "Harish Raghav"
    email: "harishraghav256@gmail.com"
runtime:
  type: docker
  dockerfile: Dockerfile
  port: 7860
tags:
  - openenv
  - multi-agent
  - helpdesk
  - self-improving
  - knowledge-base
  - tiered-support
  - sla-compliance
  - reinforcement-learning
  - trl-grpo
tasks:
  - id: helpdesk_triage
    name: Helpdesk Ticket Triage
    description: "Classify a ticket by category, priority, and support tier using the Triage Agent."
    difficulty: medium
    grader:
      type: python
      path: graders.py
      function: grade_triage
  - id: helpdesk_resolution
    name: Helpdesk Ticket Resolution
    description: "Resolve IT tickets through multi-agent L1/L2/L3 collaboration within SLA constraints."
    difficulty: hard
    grader:
      type: python
      path: graders.py
      function: grade_efficiency
  - id: helpdesk_kb_contribution
    name: Knowledge Base Contribution
    description: "Write detailed KB articles for novel issues to enable self-improvement across episodes."
    difficulty: hard
    grader:
      type: python
      path: graders.py
      function: grade_kb_contribution